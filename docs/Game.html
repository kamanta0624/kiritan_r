@keyframes sceneFadeIn  {from{opacity:0} to{opacity:1}}

<!-- ═══════════════════════════════════════════════════════

<script type="text/babel" id="shared-ui">
const {useState, useEffect, useRef, useCallback, useMemo} = React;

function fmtN(n){ return n >= 1000 ? n.toLocaleString() : String(n); }

// ── Common Top Bar ─────────────────────────────────────────
function TopBar({ scene, areaName, currentArea, breadcrumb, rightSlot }) {
  return (
    <div style={{
      ...glass({borderRadius:0, border:'none', borderBottom:`1px solid ${BR}`,
        background:'rgba(255,253,251,.97)'}),
      position:'absolute', top:0, left:0, right:0, height:52,
      display:'flex', alignItems:'center', padding:'0 16px', gap:0, zIndex:10,
    }}>
      <img src="assets/logo_tohoku.png" alt="東北家"
        style={{height:28, objectFit:'contain', marginRight:12}}/>
      <div style={{width:1, height:'55%', background:BR, marginRight:12}}/>

      {breadcrumb && (
        <div style={{display:'flex', alignItems:'center', gap:6}}>
          {breadcrumb.map((item, i) => (
            <React.Fragment key={i}>
              {i > 0 && <span style={{fontSize:11, color:TXF}}>›</span>}
              <span style={{
                fontSize:11,
                color: i === breadcrumb.length - 1 ? TX : TXD,
                fontFamily:"'Noto Sans JP'",
                fontWeight: i === breadcrumb.length - 1 ? 700 : 400,
              }}>{item}</span>
            </React.Fragment>
          ))}
        </div>
      )}

      {!breadcrumb && (
        <>
          {[
            {label:'ターン', val: String(GAME_STATE.turn), c:TX},
            {label:'ミーム', val: String(GAME_STATE.meme), c:PK},
            {label:'収入',   val:`+${GAME_STATE.income}/T`, c:AC},
            {label:'拠点',   val: GAME_STATE.bases, c:TX},
          ].map((item,i) => (
            <div key={i} style={{display:'flex', alignItems:'center', gap:4,
              padding:'0 11px', borderRight:`1px solid ${BR}`, height:'100%'}}>
              <span style={{fontSize:10, color:TXD, whiteSpace:'nowrap'}}>{item.label}</span>
              <span style={{fontFamily:'Rajdhani', fontWeight:700, fontSize:15,
                color:item.c, whiteSpace:'nowrap'}}>{item.val}</span>
            </div>
          ))}
          <div style={{marginLeft:'auto', paddingLeft:12, fontFamily:'Rajdhani',
            fontSize:15, fontWeight:700, letterSpacing:1, color:TX,
            whiteSpace:'nowrap', flexShrink:0}}>
            ROUND {GAME_STATE.round}
          </div>
        </>
      )}

      {rightSlot && (
        <div style={{marginLeft: breadcrumb ? 'auto' : 16}}>
          {rightSlot}
        </div>
      )}
    </div>
  );
}

// ── Common Bottom Bar ──────────────────────────────────────
function BottomBar({ scene, onNavigate, extraLeft, extraRight }) {
  const isMap = scene === 'map';
  const isParty = scene === 'party';

  return (
    <div style={{
      ...glass({borderRadius:0, border:'none', borderTop:`1px solid ${BR}`,
        background:'rgba(255,253,251,.97)'}),
      position:'absolute', bottom:0, left:0, right:0, height:52,
      display:'flex', alignItems:'center', padding:'0 16px', gap:10, zIndex:10,
    }}>

      {/* ── Map scene buttons ── */}
      {isMap && (
        <>
          <button style={{display:'flex', alignItems:'center', gap:6, padding:'8px 16px',
            borderRadius:20, background:'rgba(0,0,0,.05)', border:`1px solid ${BR}`,
            color:TXD, cursor:'pointer', fontSize:12, fontFamily:"'Noto Sans JP'",
            whiteSpace:'nowrap'}}>
            ≡ メニュー
          </button>
          {['建設','アイテム'].map(l => (
            <button key={l} style={{padding:'7px 14px', borderRadius:20,
              background:'rgba(0,0,0,.04)', border:`1px solid ${BR}`,
              color:TXD, cursor:'pointer', fontSize:12,
              fontFamily:"'Noto Sans JP'", whiteSpace:'nowrap'}}>
              {l}
            </button>
          ))}
          <NavButton label="仲間" onClick={() => onNavigate('party')}
            activeColor={TEAL} activeBg='rgba(26,138,150,.12)'/>
          <NavButton label="🎬 ADVテスト" onClick={() => onNavigate('adv')}
            activeColor={PK} activeBg='rgba(196,66,122,.12)'/>
          <div style={{flex:1}}/>
          <button
            onClick={() => onNavigate('turnEnd')}
            style={{
              padding:'9px 22px', borderRadius:20,
              background:`linear-gradient(135deg,${PK},${PK2})`,
              border:'none', color:'#fff', cursor:'pointer',
              fontFamily:"'Noto Sans JP'", fontSize:13, fontWeight:700,
              boxShadow:`0 2px 16px rgba(196,66,122,.4)`, whiteSpace:'nowrap',
            }}>ターン終了 →</button>
        </>
      )}

      {/* ── Party scene buttons ── */}
      {isParty && (
        <>
          <NavButton
            label="← マップに戻る"
            onClick={() => onNavigate('map')}
            activeColor={TEAL}
            activeBg='rgba(26,138,150,.1)'
          />
          <div style={{flex:1}}/>
          <div style={{fontSize:10, color:TXF, fontFamily:"'Noto Sans JP'"}}>
            編成済み：{CHARS.filter(c=>c.joined).length} 人
          </div>
        </>
      )}

      {extraLeft}
      {extraRight}
    </div>
  );
}

// ── Nav button helper ──────────────────────────────────────
function NavButton({ label, onClick, activeColor, activeBg }) {
  const [hov, setHov] = React.useState(false);
  return (
    <button
      onClick={onClick}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        padding:'7px 14px', borderRadius:20,
        background: hov ? activeBg : 'rgba(0,0,0,.04)',
        border:`1px solid ${hov ? activeColor+'44' : BR}`,
        color: hov ? activeColor : TXD,
        cursor:'pointer', fontSize:12,
        fontFamily:"'Noto Sans JP'", whiteSpace:'nowrap',
        transition:'all .15s',
      }}>
      {label}
    </button>
  );
}

Object.assign(window, { TopBar, BottomBar, NavButton, fmtN });
</script>

// ── Node shape ─────────────────────────────────────────────

        <path d="M-13,4 L-13,-5 L-9,-5 L-9,-11 L-5,-11 L-5,-5 L-1,-5 L-1,-11 L3,-11 L3,-5 L7,-5 L7,-11 L11,-11 L11,-5 L14,-5 L14,10 L-13,10 Z"
          fill="rgba(255,255,255,.9)" stroke={color} strokeWidth={selected?2.5:1.8} filter={canAttack?"url(#cityGlow)":undefined}/>
        <path d="M-13,4 L-13,-5 L-9,-5 L-9,-11 L-5,-11 L-5,-5 L-1,-5 L-1,-11 L3,-11 L3,-5 L7,-5 L7,-11 L11,-11 L11,-5 L14,-5 L14,10 L-13,10 Z" fill={color} opacity=".18"/>

    case 'village': return (

        <circle cx={0} cy={0} r={9} fill="rgba(255,255,255,.9)" stroke={color} strokeWidth={selected?2.5:1.8}/>
        <circle cx={0} cy={0} r={9} fill={color} opacity=".18"/>
        <line x1={0} y1={-5} x2={0} y2={5} stroke={color} strokeWidth={1.5} opacity=".7"/>

// ── Map SVG ────────────────────────────────────────────────
function MapLayer({selNode, onNodeClick}) {
  return (
    <svg width={MAP_W} height={MAP_H}
      style={{position:'absolute', top:0, left:0, overflow:'visible', display:'block'}}>
      <line x1={BOUNDARY_X} y1={0} x2={BOUNDARY_X} y2={MAP_H}
        stroke="rgba(255,255,255,.2)" strokeWidth="2" strokeDasharray="8 10"/>
      {EDGES.map(([a,b],i)=>{
        const na=NODES.find(n=>n.id===a), nb=NODES.find(n=>n.id===b);
        if(!na||!nb) return null;
        return (
          <g key={i}>
            <line x1={na.px} y1={na.py} x2={nb.px} y2={nb.py} stroke="rgba(255,255,255,.5)" strokeWidth="2.5"/>
            <line x1={na.px} y1={na.py} x2={nb.px} y2={nb.py} stroke="rgba(0,0,0,.1)" strokeWidth="1.2"/>
          </g>
        );
      })}
      {NODES.map(n=>{
        const ow=OWN[n.owner]||OWN.neutral, sel=selNode?.id===n.id;
        return (
          <g key={n.id} transform={`translate(${n.px},${n.py})`}
            style={{cursor:'pointer'}} onClick={()=>onNodeClick(n)}>
            {sel && <circle r={22} fill={ow.fill} stroke={ow.c} strokeWidth="1.5" opacity=".8"/>}
            {n.canAttack && !sel && (
              <circle r={20} fill="none" stroke={PK} strokeWidth="1.5" opacity=".6"
                style={{animation:'pulse 1.3s ease-in-out infinite'}}/>
            )}
            <NodeShape type={n.type} color={ow.c} selected={sel} canAttack={n.canAttack}/>
            <g transform="translate(0,20)">
              <rect x={-30} y={-1} width={60} height={16} rx={4}
                fill="rgba(255,253,251,.9)" stroke={ow.c} strokeWidth=".8"/>
              <text x={0} y={11} textAnchor="middle"
                style={{fontSize:9, fontFamily:'Noto Sans JP',
                  fontWeight:sel||n.canAttack?700:500,
                  fill:n.canAttack?PK:TX}}>
                {n.name}
              </text>
            </g>
            <g transform="translate(16,-16)">
              <rect x={-10} y={-7} width={20} height={12} rx={3} fill={ow.c}/>
              <text x={0} y={2} textAnchor="middle"
                style={{fontSize:7, fontFamily:'Noto Sans JP', fontWeight:700, fill:'#fff'}}>
                {n.type==='city'?'都市':n.type==='town'?'街':n.type==='village'?'村':'砦'}
              </text>
            </g>
          </g>
        );
      })}
    </svg>
  );
}

// ── Area name overlay ──────────────────────────────────────
function AreaNameOverlay({areaName, triggerKey}) {
  const [visible, setVisible] = React.useState(false);
  const timerRef = React.useRef(null);
  React.useEffect(()=>{
    if(!areaName) return;
    setVisible(true);
    if(timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(()=>setVisible(false), 2400);
    return()=>clearTimeout(timerRef.current);
  },[triggerKey]);
  if(!visible || !areaName) return null;
  const isHokkaido = areaName==='北海道';
  return (
    <div style={{position:'absolute', top:24, right:24, pointerEvents:'none', zIndex:30,
      display:'flex', flexDirection:'column', alignItems:'flex-end',
      animation:'areaNameShow 2.4s ease forwards'}}>
      <div style={{width:40, height:1.5, background:isHokkaido?'rgba(180,205,228,.9)':'rgba(160,195,155,.9)', marginBottom:6}}/>
      <div style={{fontFamily:"'Zen Maru Gothic'", fontSize:36, fontWeight:900,
        letterSpacing:'.18em', color:'rgba(255,255,255,.95)',
        textShadow:'0 2px 20px rgba(0,0,0,.5), 0 0 40px rgba(0,0,0,.3)', lineHeight:1}}>
        {areaName}
      </div>
      <div style={{fontFamily:'Rajdhani', fontSize:12, fontWeight:600, letterSpacing:'.28em',
        color:'rgba(255,255,255,.65)', textTransform:'uppercase', marginTop:4}}>
        {isHokkaido?'HOKKAIDO':'TOHOKU'}
      </div>
      <div style={{width:40, height:1.5, background:isHokkaido?'rgba(180,205,228,.9)':'rgba(160,195,155,.9)', marginTop:6}}/>
    </div>
  );
}

// ── Mini-map ───────────────────────────────────────────────
function MiniMap({offsetX, offsetY, vpW, vpH}) {
  const mmW=140, mmH=80;
  const scaleX=mmW/MAP_W, scaleY=mmH/MAP_H;
  return (
    <div style={{...glass({borderRadius:8, padding:0, border:'1px solid rgba(255,255,255,.7)',
      overflow:'hidden', boxShadow:'0 2px 12px rgba(0,0,0,.2)'}),
      position:'absolute', bottom:16, right:16, zIndex:20}}>
      <svg width={mmW} height={mmH}>
        <rect x={0}     y={0} width={mmW/2} height={mmH} fill="rgba(190,210,225,.6)"/>
        <rect x={mmW/2} y={0} width={mmW/2} height={mmH} fill="rgba(175,200,170,.6)"/>
        <line x1={mmW/2} y1={0} x2={mmW/2} y2={mmH} stroke="rgba(255,255,255,.4)" strokeWidth="1"/>

          return <circle key={n.id} cx={n.px*scaleX} cy={n.py*scaleY} r={2.5} fill={ow.c} opacity=".8"/>;
        })}

}

// ── Legend ─────────────────────────────────────────────────
function Legend() {
  return (
    <div style={{...glass({borderRadius:8, padding:'8px 10px', boxShadow:'0 2px 12px rgba(0,0,0,.15)'}),
      position:'absolute', top:16, left:16, zIndex:20, minWidth:110}}>
      <div style={{fontSize:8, fontFamily:'Rajdhani', fontWeight:700, color:TXD, letterSpacing:'.12em', marginBottom:6}}>LEGEND</div>
      {[{color:TEAL,label:'自拠点'},{color:PK,label:'敵拠点'},{color:'#2a9a58',label:'友軍'},{color:'#8a8e96',label:'中立'}].map(f=>(

// ── Map Scene ──────────────────────────────────────────────
function MapScene({ onNavigate, onAttackNode }) {
  const vpRef = React.useRef(null);
  const [vpSize, setVpSize] = React.useState({w: window.innerWidth, h: window.innerHeight - 104});
  const initOffsetX = Math.max(0, Math.min(1900 - window.innerWidth/2, MAP_W - window.innerWidth));
  const initOffsetY = Math.max(0, Math.min(680  - (window.innerHeight-104)/2, MAP_H - (window.innerHeight-104)));
  const [offset, setOffset] = React.useState({x: initOffsetX, y: initOffsetY});
  const dragRef = React.useRef(null);

  const currentArea = (offset.x + vpSize.w/2) < BOUNDARY_X ? 'hokkaido' : 'tohoku';
  const AREA_NAMES = {hokkaido:'北海道', tohoku:'東北'};
  const [areaNameInfo, setAreaNameInfo] = React.useState({name:AREA_NAMES[currentArea], key:0});
  const prevAreaRef = React.useRef(currentArea);

  React.useEffect(()=>{
    if(prevAreaRef.current !== currentArea){
      prevAreaRef.current = currentArea;
      setAreaNameInfo(p=>({name:AREA_NAMES[currentArea], key:p.key+1}));
    }
  },[currentArea]);

  React.useEffect(()=>{
    const resize=()=>setVpSize({w:window.innerWidth, h:window.innerHeight-104});
    window.addEventListener('resize', resize);
    return()=>window.removeEventListener('resize', resize);
  },[]);

  const clamp = React.useCallback((ox,oy)=>({
    x:Math.max(0,Math.min(ox,MAP_W-vpSize.w)),
    y:Math.max(0,Math.min(oy,MAP_H-vpSize.h)),
  }),[vpSize]);

  const onPointerDown = React.useCallback(e=>{
    e.preventDefault();
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    dragRef.current={startX:cx, startY:cy, offsetX:offset.x, offsetY:offset.y, moved:false};
  },[offset]);

  const onPointerMove = React.useCallback(e=>{
    if(!dragRef.current) return;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    const dx=cx-dragRef.current.startX, dy=cy-dragRef.current.startY;
    if(Math.abs(dx)>3||Math.abs(dy)>3) dragRef.current.moved=true;
    setOffset(clamp(dragRef.current.offsetX-dx, dragRef.current.offsetY-dy));
  },[clamp]);

  const onPointerUp = React.useCallback(()=>{ dragRef.current=null; },[]);

  const [selNode, setSelNode] = React.useState(null);
  const handleNodeClick = React.useCallback(n=>{
    if(dragRef.current?.moved) return;
    setSelNode(prev=>prev?.id===n.id?null:n);
  },[]);

  const getPopupPos = React.useCallback((n)=>{
    const sx=n.px-offset.x, sy=n.py-offset.y;
    const popW=210, popH=220;
    let left=sx+24, top=Math.max(8,Math.min(sy-40,vpSize.h-popH-8));
    if(left+popW>vpSize.w-8) left=sx-popW-24;
    return {left, top};
  },[offset, vpSize]);

  const tohokuOpacity  = currentArea==='tohoku'  ? 1 : 0;
  const hokkaidoOpacity = currentArea==='hokkaido' ? 1 : 0;

  return (
    <div className="scene-enter" style={{width:'100vw', height:'100vh',
      fontFamily:"'Noto Sans JP',sans-serif", color:TX,
      position:'relative', overflow:'hidden'}}>

      {/* TOP BAR */}
      <TopBar scene="map" currentArea={currentArea}
        rightSlot={
          <div style={{
            padding:'4px 12px', borderRadius:20,
            background:currentArea==='tohoku'?'rgba(160,195,155,.25)':'rgba(180,205,225,.25)',
            border:`1px solid ${currentArea==='tohoku'?'rgba(145,185,135,.5)':'rgba(160,190,215,.5)'}`,
            display:'flex', alignItems:'center', gap:6,
            transition:'background .6s, border-color .6s',
          }}>
            <div style={{width:6, height:6, borderRadius:'50%',
              background:currentArea==='tohoku'?'#2a9a58':'#4488bb',
              transition:'background .6s'}}/>
            <span style={{fontFamily:"'Zen Maru Gothic'", fontSize:11, fontWeight:900, color:TX}}>
              {AREA_NAMES[currentArea]}
            </span>
          </div>
        }
      />

      {/* MAP VIEWPORT */}
      <div
        ref={vpRef}
        onMouseDown={onPointerDown} onMouseMove={onPointerMove}
        onMouseUp={onPointerUp} onMouseLeave={onPointerUp}
        onTouchStart={onPointerDown} onTouchMove={onPointerMove} onTouchEnd={onPointerUp}
        style={{position:'absolute', top:52, left:0, right:0, bottom:52,
          overflow:'hidden', cursor:'grab', userSelect:'none'}}>

        {/* Backgrounds */}
        <div style={{position:'absolute', inset:0, zIndex:0}}>
          <div style={{position:'absolute', inset:0, opacity:tohokuOpacity, transition:'opacity .9s ease', pointerEvents:'none'}}>
            <TohokuBg w={vpSize.w} h={vpSize.h}/>
          </div>
          <div style={{position:'absolute', inset:0, opacity:hokkaidoOpacity, transition:'opacity .9s ease', pointerEvents:'none'}}>
            <HokkaidoBg w={vpSize.w} h={vpSize.h}/>
          </div>
        </div>

        {/* Draggable map */}
        <div style={{position:'absolute',
          transform:`translate(${-offset.x}px,${-offset.y}px)`,
          width:MAP_W, height:MAP_H, zIndex:1}}>
          <MapLayer selNode={selNode} onNodeClick={handleNodeClick}/>
        </div>

        <AreaNameOverlay areaName={areaNameInfo.name} triggerKey={areaNameInfo.key}/>

        {/* Node popup */}
        {selNode && (()=>{
          const pos = getPopupPos(selNode);
          return (
            <div style={{position:'absolute', zIndex:20, ...pos}}>
              <NodePopup
                node={selNode}
                onClose={()=>setSelNode(null)}
                onAttack={(node)=>{ onAttackNode(node); }}
              />
            </div>
          );
        })()}

        <MiniMap offsetX={offset.x} offsetY={offset.y} vpW={vpSize.w} vpH={vpSize.h}/>
        <Legend/>

        {/* boundary glow */}
        {(()=>{
          const bx = BOUNDARY_X - offset.x;
          if(bx < -40 || bx > vpSize.w + 40) return null;
          return (
            <div style={{position:'absolute', left:bx-20, top:0, bottom:0, width:40,
              background:'linear-gradient(to right,transparent,rgba(255,255,255,.15),transparent)',
              pointerEvents:'none', zIndex:2}}/>
          );
        })()}
      </div>

      {/* BOTTOM BAR */}
      <BottomBar scene="map" onNavigate={onNavigate}/>
    </div>
  );
}

Object.assign(window, { MapScene });
</script>

        </svg>

function AttackFormationScene({ targetNode, onLaunch, onCancel }) {
  // formation: { front1, front2, rear1, rear2 } — null or char
  const [formation, setFormation] = React.useState({ front1:null, front2:null, rear1:null, rear2:null });
  const [hoverId, setHoverId] = React.useState(null);

  const joinedChars = CHARS.filter(c => c.joined);
  const selectedIds = Object.values(formation).filter(Boolean).map(c => c.id);

  // ルール判定
  const frontCount = [formation.front1, formation.front2].filter(Boolean).length;
  const rearCount  = [formation.rear1,  formation.rear2 ].filter(Boolean).length;
  const totalCount = frontCount + rearCount;
  const canLaunch  = frontCount >= 1 && totalCount >= 1;

  const handleCharClick = (char) => {
    if(selectedIds.includes(char.id)) {
      // 外す
      setFormation(prev => {
        const next = {...prev};
        Object.keys(next).forEach(k => { if(next[k]?.id === char.id) next[k] = null; });
        return next;
      });
      return;
    }
    // 追加
    if(isFront(char)) {
      setFormation(prev => {
        if(!prev.front1) return {...prev, front1: char};
        if(!prev.front2) return {...prev, front2: char};
        return prev; // 満杯
      });
    } else {
      setFormation(prev => {
        if(!prev.rear1) return {...prev, rear1: char};
        if(!prev.rear2) return {...prev, rear2: char};
        return prev;
      });
    }
  };

  const handleRemove = (slot) => {
    setFormation(prev => ({...prev, [slot]: null}));
  };

  const frontChars  = joinedChars.filter(isFront);
  const rearChars   = joinedChars.filter(c => !isFront(c));

  // 敵情報
  const ow = { c: PK, label: '敵拠点' };
  const typeLabel = targetNode ? ({city:'都市',town:'街',village:'村',fort:'砦'}[targetNode.type]||targetNode.type) : '';

  return (
    <div className="scene-enter" style={{
      width:'100vw', height:'100vh',
      background:'linear-gradient(160deg,#0d0818 0%,#1a1030 60%,#0a1420 100%)',
      fontFamily:"'Noto Sans JP',sans-serif",

            </div>
            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))', gap:8}}>
              {rearChars.map(c => {
                const isSelected = selectedIds.includes(c.id);
                const isFull = rearCount >= 2 && !isSelected;
                const role = ROLES[c.role];
                return (
                  <div key={c.id}
                    onClick={() => !isFull && handleCharClick(c)}
                    onMouseEnter={() => setHoverId(c.id)}
                    onMouseLeave={() => setHoverId(null)}
                    style={{
                      display:'flex', alignItems:'center', gap:10,
                      padding:'10px 12px', borderRadius:8,
                      background: isSelected ? `${TEAL}22` : hoverId===c.id && !isFull ? 'rgba(255,255,255,.07)' : 'rgba(255,255,255,.04)',
                      border:`1.5px solid ${isSelected ? TEAL+'88' : hoverId===c.id && !isFull ? 'rgba(255,255,255,.2)' : 'rgba(255,255,255,.08)'}`,
                      cursor: isFull ? 'not-allowed' : 'pointer',
                      opacity: isFull ? 0.4 : 1,
                      transition:'all .15s',
                    }}>
                    <div style={{width:44, height:52, borderRadius:6, overflow:'hidden', flexShrink:0,

                      <div style={{fontFamily:"'Zen Maru Gothic'", fontSize:12, fontWeight:900,

                      <div style={{display:'flex', gap:6, marginTop:3, alignItems:'center'}}>

<!-- ═══════════════════════════════════════════════════════

<script type="text/babel" id="battle-scene">

// BattleScene-local palette (prefix B_ to avoid collision)
const B_AP = {
  pk:'#c4427a', pk2:'#9e2d5f', pkBg:'rgba(196,66,122,.1)', pkBdr:'rgba(196,66,122,.35)',
  ac:'#b87010', ac2:'#d4a044', acBg:'rgba(192,112,16,.1)', acBdr:'rgba(192,112,16,.35)',
  teal:'#1a8a96', tealBg:'rgba(26,138,150,.1)', tealBdr:'rgba(26,138,150,.35)',
  glass:'rgba(255,253,251,.93)', glassBdr:'rgba(255,255,255,.75)',
  shadow:'0 2px 20px rgba(0,0,0,.13)',
  tx:'#1c1020', txd:'rgba(28,16,32,.55)', txf:'rgba(28,16,32,.28)', br:'rgba(0,0,0,.07)',
};
const bGlass = (x={}) => ({background:B_AP.glass,backdropFilter:'blur(14px)',WebkitBackdropFilter:'blur(14px)',border:`1px solid ${B_AP.glassBdr}`,boxShadow:B_AP.shadow,...x});
const bFmt = n => n>=1000 ? n.toLocaleString() : String(n);

// Resolve constants
const RPK2='#c4427a', RAC2='#d4a044', RBG2='#0a0816', RTX2='#f0ece4', RTXD2='rgba(240,236,228,.5)';
const RPH2=['intro','battle','collision','resolve','result'];
const RDUR2={intro:1500,battle:950,collision:700,resolve:1800};
const ROUT2={atkTroopDmg:10,atkHPDmg:2,defTroopDmg:120,defHPDmg:3};

function BRoleTag({role}){
  const m={'前衛':{bg:'rgba(196,66,122,.12)',c:B_AP.pk,brd:B_AP.pkBdr},'間接':{bg:'rgba(26,138,150,.1)',c:B_AP.teal,brd:B_AP.tealBdr},'後衛':{bg:'rgba(0,0,0,.06)',c:B_AP.txd,brd:B_AP.br}};
  const s=m[role]||m['後衛'];
  return <span style={{fontSize:7,padding:'1px 4px',borderRadius:2,fontWeight:700,letterSpacing:.3,background:s.bg,color:s.c,border:`1px solid ${s.brd}`,flexShrink:0}}>{role}</span>;
}

function BMemeBar({meme,max,teamMax,ally}){
  const pct=Math.max(0,Math.min(100,(meme/teamMax)*100));
  const low=meme/max<.3;
  return(
    <div style={{height:5,background:'rgba(0,0,0,.1)',borderRadius:4,overflow:'hidden',position:'relative'}}>
      <div style={{position:'absolute',inset:0,width:`${pct}%`,borderRadius:4,
        background:low?'linear-gradient(90deg,#c04040,#e05555)':ally?`linear-gradient(90deg,${B_AP.pk2},${B_AP.pk})`:`linear-gradient(90deg,#8a6010,${B_AP.ac2})`,
        transition:'width .4s ease'}}/>
    </div>
  );
}

function BUnitCard({unit,ally,phase,targetId,onTarget,teamMax}){
  const [hov,setHov]=React.useState(false);
  const [clicked,setClicked]=React.useState(false);
  const isActive=unit.status==='active',isDone=unit.status==='done';
  const isTargetable=!ally&&phase==='targeting',isTargeted=targetId===unit.id;
  let brd=B_AP.br;
  if(isActive) brd=B_AP.pk;
  if(isTargeted) brd=B_AP.ac2;
  if(isTargetable&&hov) brd=B_AP.ac2;
  return(
    <div
      className={`${isActive?'active-glow':isTargeted?'target-ring':''}${isTargeted?' targeted-shake':''}`}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      onClick={()=>{if(!isTargetable)return;onTarget(unit.id);setClicked(true);setTimeout(()=>setClicked(false),400);}}
      style={{...bGlass(),flex:isActive?2.6:0.85,minHeight:0,position:'relative',borderRadius:8,border:`1.5px solid ${brd}`,display:'flex',overflow:'hidden',opacity:isDone?.62:1,cursor:isTargetable?'crosshair':'default',transition:'flex .28s ease,border-color .18s,opacity .25s',background:isActive?'rgba(255,240,246,.96)':isTargeted?'rgba(255,248,232,.95)':B_AP.glass}}>
      <div style={{width:isActive?80:52,flexShrink:0,overflow:'hidden',position:'relative',transition:'width .28s ease',background:ally?(isActive?'linear-gradient(180deg,rgba(255,210,228,.3),rgba(255,240,248,.15))':'rgba(196,66,122,.06)'):(isActive?'linear-gradient(180deg,rgba(255,240,200,.3),rgba(255,250,225,.15))':'rgba(212,160,68,.08)')}}>
        {unit.portrait?<img src={unit.portrait} alt={unit.name} style={{width:'100%',height:'100%',display:'block',objectFit:'cover',objectPosition:isActive?'center 15%':'center top'}}/>
          :<div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={ally?'rgba(196,66,122,.3)':'rgba(192,112,16,.3)'} strokeWidth="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>}
        {isDone&&<div style={{position:'absolute',inset:0,background:'rgba(255,255,255,.35)'}}/>}
      </div>
      <div style={{flex:1,padding:isActive?'8px 9px':'5px 8px',display:'flex',flexDirection:'column',gap:isActive?4:2,minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          {isActive?<span style={{fontFamily:"'Zen Maru Gothic',sans-serif",fontSize:15,fontWeight:900,color:B_AP.pk,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{unit.name}</span>
            :<span style={{fontSize:11,fontWeight:700,color:B_AP.tx,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{unit.name}</span>}
          <BRoleTag role={unit.role}/>
        </div>
        <div>
          <div style={{display:'flex',alignItems:'baseline',gap:4,marginBottom:2}}>
            <span style={{fontFamily:'Rajdhani',fontWeight:700,fontSize:isActive?20:13,color:ally?B_AP.pk:B_AP.ac,lineHeight:1}}>{bFmt(unit.meme)}</span>
            <span style={{fontFamily:'Rajdhani',fontSize:10,color:B_AP.txd}}>/ {bFmt(unit.max)}</span>
          </div>
          <BMemeBar meme={unit.meme} max={unit.max} teamMax={teamMax} ally={ally}/>
        </div>
        {isActive&&<div style={{marginTop:'auto',background:'rgba(255,255,255,.75)',border:`1px solid ${B_AP.pkBdr}`,borderRadius:6,padding:'5px 8px',fontSize:11,color:B_AP.tx,fontStyle:'italic',lineHeight:1.5}}>
          「さあ、いくよ！」
        </div>}
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontFamily:'Rajdhani',fontSize:11,color:B_AP.txd}}>攻<b style={{color:B_AP.tx}}>{unit.atk}</b></span>
          <span style={{fontFamily:'Rajdhani',fontSize:11,color:B_AP.txd}}>守<b style={{color:B_AP.tx}}>{unit.def}</b></span>
          {unit.bonus&&<span style={{fontSize:8,color:B_AP.ac,background:B_AP.acBg,borderRadius:2,padding:'1px 4px',border:`1px solid ${B_AP.acBdr}`}}>{unit.bonus}</span>}
        </div>
      </div>
      <div className={isActive?'badge-blink':''} style={{position:'absolute',top:4,right:5,fontSize:8,fontWeight:700,padding:'1px 6px',borderRadius:10,...(isActive?{background:B_AP.pk,color:'#fff',boxShadow:`0 0 8px ${B_AP.pkBdr}`}:isDone?{background:'rgba(0,0,0,.08)',color:B_AP.txd}:{background:'rgba(0,0,0,.05)',color:B_AP.txf,border:`1px solid ${B_AP.br}`})}}>
        {isActive?'行動中':isDone?'完了':'待機'}
      </div>
      {clicked&&<div style={{position:'absolute',inset:0,borderRadius:7,background:'rgba(255,200,60,.55)',pointerEvents:'none',animation:'clickFlash .4s ease forwards'}}/>}
      {isTargetable&&hov&&!isTargeted&&(
        <div style={{position:'absolute',inset:0,borderRadius:7,pointerEvents:'none',background:'rgba(212,160,68,.13)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:6}}>
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke={B_AP.ac2} strokeWidth="1.6" style={{filter:'drop-shadow(0 0 6px rgba(212,160,68,.8))',animation:'crosshairSpin 3s linear infinite'}}>
            <circle cx="12" cy="12" r="7"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
          </svg>
          <span style={{fontSize:10,fontWeight:700,letterSpacing:1.5,color:'#fff',background:'rgba(180,100,0,.85)',padding:'3px 12px',borderRadius:4}}>TARGET</span>
        </div>
      )}
      {isTargeted&&(
        <div style={{position:'absolute',inset:0,borderRadius:7,pointerEvents:'none',background:'rgba(212,160,68,.1)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke={B_AP.ac2} strokeWidth="2" style={{filter:`drop-shadow(0 0 8px ${B_AP.ac2})`}}>
            <circle cx="12" cy="12" r="7"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
            <circle cx="12" cy="12" r="2" fill={B_AP.ac2}/>
          </svg>
        </div>
      )}
    </div>
  );
}

// ActionScene — uses formation passed in
function BActionScene({round, formation, targetNode, onComplete}){
  const enemies = [
    {id:'e1',name:'北海道めろん',role:'前衛',atk:10,def:8,meme:500,max:500,portrait:'assets/portrait_meron.png'},
    {id:'e2',name:'ベルン',role:'後衛',atk:8,def:10,meme:518,max:518,bonus:'兵守+1',portrait:'assets/portrait_bern_fog.png'},
    {id:'e3',name:'沖縄あわも',role:'前衛',atk:10,def:8,meme:500,max:500,portrait:'assets/portrait_awamo.png'},
    {id:'e4',name:'フォーグ',role:'後衛',atk:8,def:9,meme:478,max:478,bonus:'兵守+1',portrait:'assets/portrait_bern_fog.png'},
  ];

  // Build allies from formation
  const buildAllies = () => {
    const slots = ['front1','front2','rear1','rear2'];
    const chars = slots.map(k => formation[k]).filter(Boolean);
    return chars.map((c,i) => ({
      id: c.id, name: c.name,
      role: ROLES[c.role]?.label || c.role,
      atk: c.atk, def: c.def,
      meme: c.meme, max: c.memeMax,
      status: i===0 ? 'active' : 'pending',
      portrait: c.portrait,
    }));
  };

  const [allies, setAllies] = React.useState(buildAllies);
  const [phase, setPhase] = React.useState('idle');
  const [action, setAction] = React.useState(null);
  const [targetId, setTargetId] = React.useState(null);
  const [log, setLog] = React.useState([]);
  const [btnReady, setBtnReady] = React.useState(false);
  const active = allies.find(u=>u.status==='active');
  const allDone = !active;

  React.useEffect(()=>{
    if(allDone) setTimeout(()=>setBtnReady(true),300);
    else setBtnReady(false);
  },[allDone]);

  const advance = () => setAllies(prev=>{
    const idx = prev.findIndex(u=>u.status==='active');
    const nxt = prev.findIndex((u,i)=>i>idx&&u.status==='pending');
    return prev.map((u,i)=>i===idx?{...u,status:'done'}:i===nxt?{...u,status:'active'}:u);
  });

  const handleAction = key => {
    if(key==='attack'){setAction('attack');setPhase('targeting');}
    else{setLog(p=>[...p,{txt:`${active.name} → ${key==='defend'?'防御態勢':'撤退'}`}]);setPhase('idle');setAction(null);setTargetId(null);advance();}
  };
  const handleConfirm = () => {
    const tgt = enemies.find(u=>u.id===targetId);
    if(tgt) setLog(p=>[...p,{txt:`${active.name} → ${tgt.name}  攻撃`}]);
    setPhase('idle');setAction(null);setTargetId(null);advance();
  };

  const enemyName = targetNode?.name || '敵拠点';

  return(
    <div style={{width:'100%',height:'100%',fontFamily:"'Noto Sans JP',sans-serif",color:B_AP.tx,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative',backgroundImage:'url(assets/bg_battle.jpg)',backgroundSize:'cover',backgroundPosition:'center'}}>
      <div style={{position:'absolute',inset:0,background:'rgba(220,210,200,.12)',pointerEvents:'none'}}/>
      <div style={{...bGlass({borderRadius:0,border:'none',borderBottom:'1px solid rgba(0,0,0,.1)',background:'rgba(255,253,251,.96)'}),display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 14px',height:42,flexShrink:0,zIndex:10,position:'relative'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <img src="assets/logo_tohoku.png" alt="東北家" style={{height:28,objectFit:'contain'}}/>
          <span style={{color:B_AP.txd,fontSize:11}}>→</span>
          <span style={{fontFamily:"'Zen Maru Gothic',sans-serif",fontSize:14,fontWeight:900,color:B_AP.pk}}>{enemyName}</span>
        </div>
        <div style={{textAlign:'center'}}>
          <div style={{fontFamily:'Rajdhani',fontSize:16,fontWeight:700,letterSpacing:2,color:B_AP.tx}}>ROUND {round} / 5</div>
          <div style={{fontSize:9,color:B_AP.txd}}>行動選択フェーズ</div>
        </div>
        <div style={{fontFamily:"'Zen Maru Gothic',sans-serif",fontSize:14,fontWeight:900,color:B_AP.ac}}>{enemyName}</div>
      </div>
      <div style={{flex:1,display:'grid',gridTemplateColumns:'248px 1fr 248px',gap:6,padding:6,minHeight:0,position:'relative',zIndex:1}}>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          <div style={{fontFamily:'Rajdhani',fontSize:9,fontWeight:700,letterSpacing:2,color:B_AP.pk,paddingLeft:4,marginBottom:-1,textShadow:'0 1px 4px rgba(255,255,255,.8)'}}>東北家 ── 自軍</div>
          {allies.map(u=><BUnitCard key={u.id} unit={u} ally={true} phase={phase} targetId={targetId} onTarget={()=>{}} teamMax={5000}/>)}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          <div style={{flexShrink:0,display:'flex',justifyContent:'center'}}>
            <div style={{...bGlass({padding:'5px 16px',borderRadius:20,border:'1px solid rgba(0,0,0,.1)'}),display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontFamily:"'Zen Maru Gothic',sans-serif",fontWeight:900,fontSize:13,color:B_AP.pk}}>東北家</span>
              <span style={{color:B_AP.txf,fontSize:11}}>vs</span>
              <span style={{fontFamily:"'Zen Maru Gothic',sans-serif",fontWeight:900,fontSize:13,color:B_AP.ac}}>{enemyName}</span>
            </div>
          </div>
          <div style={{...bGlass({borderRadius:6,padding:'6px 10px',flexShrink:0}),minHeight:44}}>
            {log.slice(-2).map((e,i)=>(
              <div key={i} style={{fontSize:10,color:B_AP.txd,lineHeight:1.8,opacity:i===log.slice(-2).length-1?1:.5}}>
                <span style={{color:B_AP.txf,marginRight:5}}>▸</span>{e.txt}
              </div>
            ))}
          </div>
          <div style={{flex:1}}/>
          {allDone&&(
            <div className="confirm-pop" style={{display:'flex',flexDirection:'column',gap:6}}>
              <div style={{...bGlass({borderRadius:7,padding:'8px 16px',border:`1.5px solid ${B_AP.pkBdr}`,background:'rgba(255,240,246,.96)'}),textAlign:'center',color:B_AP.pk,fontWeight:700,fontSize:12}}>全員の行動が完了しました</div>
              <button onClick={onComplete} style={{padding:'13px',borderRadius:7,background:btnReady?B_AP.pk:'rgba(196,66,122,.3)',border:`2px solid ${B_AP.pk}`,color:'#fff',cursor:'pointer',fontFamily:"'Noto Sans JP',sans-serif",fontSize:15,fontWeight:700,letterSpacing:1,boxShadow:btnReady?'0 0 28px rgba(196,66,122,.65),0 4px 20px rgba(196,66,122,.4)':'none',transition:'all .4s ease',display:'flex',alignItems:'center',justifyContent:'center',gap:10}}>
                <span style={{fontSize:18}}>⚔️</span><span>戦闘解決へ</span><span style={{fontSize:20,opacity:.8}}>→</span>
              </button>

          {!allDone&&<BActionPanel active={active} phase={phase} action={action} targetId={targetId} enemies={enemies} onAction={handleAction} onConfirm={handleConfirm} onBack={()=>{setPhase('idle');setAction(null);setTargetId(null);}}/>}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:4}}>
          <div style={{fontFamily:'Rajdhani',fontSize:9,fontWeight:700,letterSpacing:2,color:B_AP.ac,paddingLeft:4,marginBottom:-1,textShadow:'0 1px 4px rgba(255,255,255,.8)'}}>敵軍</div>

        {[{label:'ターン',val:'1',c:B_AP.tx},{label:'ミーム',val:'500',c:B_AP.pk},{label:'収入',val:'+600/T',c:B_AP.ac},{label:'拠点',val:'11/92',c:B_AP.tx}].map((item,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:5,padding:'0 10px',height:'100%',borderRight:`1px solid ${B_AP.br}`,fontSize:11}}>

// ResolveScene
function BResolveScene({round, formation, targetNode, onComplete}){
  const firstChar = formation && (formation.front1 || formation.front2);
  const RATKER2 = firstChar ? {
    name: firstChar.name,
    portrait: firstChar.portrait || 'assets/portrait_kiritan.png',
    troops:10, maxTroops:10, hp:8, maxHp:10, atk:firstChar.atk,
    color:RPK2, glow:'rgba(196,66,122,.75)',
    lines:{intro:'「全力でいきます！」',battle:'「行くよ！！」',collision:'「くっ…！」',resolve:'「やった…！」',result:'「次も頑張ります！」'},
  } : {
    name:'東北きりたん', portrait:'assets/portrait_kiritan.png',
    troops:10,maxTroops:10,hp:8,maxHp:10,atk:6,
    color:RPK2,glow:'rgba(196,66,122,.75)',
    lines:{intro:'「全力でいきます！」',battle:'「行くよ！！」',collision:'「くっ…！」',resolve:'「やった…！」',result:'「次も頑張ります！」'},
  };
  const RDEFDR2 = {
    name: targetNode?.name || '敵',
    portrait:'assets/portrait_meron.png',
    troops:targetNode?.troops||500, maxTroops:targetNode?.troops||500,
    hp:10, maxHp:10, atk:10,
    color:RAC2, glow:'rgba(212,160,68,.75)',
    lines:{intro:'「やってみろ！」',battle:'「防御陣形！」',collision:'「ぐっ…！」',resolve:'「損害は出たが…」',result:'「まだまだだ」'},
  };

  const [phaseIdx,setPhaseIdx]=React.useState(0);
  const phase=RPH2[phaseIdx];
  const [atkT,setAtkT]=React.useState(RATKER2.troops);
  const [defT,setDefT]=React.useState(RDEFDR2.troops);
  const [atkHP,setAtkHP]=React.useState(RATKER2.hp);
  const [defHP,setDefHP]=React.useState(RDEFDR2.hp);
  const [showIntro,setShowIntro]=React.useState(true);
  const [introFading,setIntroFading]=React.useState(false);
  const [showBattle,setShowBattle]=React.useState(false);
  const [showCollision,setShowCollision]=React.useState(false);
  const [showBurst,setShowBurst]=React.useState(false);
  const [atkShake,setAtkShake]=React.useState(false);
  const [defShake,setDefShake]=React.useState(false);
  const [atkBanner,setAtkBanner]=React.useState(null);
  const [defBanner,setDefBanner]=React.useState(null);
  const timers=React.useRef([]);
  const T=(fn,ms)=>{const t=setTimeout(fn,ms);timers.current.push(t);};
  const clearT=()=>{timers.current.forEach(clearTimeout);timers.current=[];};

  const skipToResult=React.useCallback(()=>{
    clearT();
    const fA=Math.max(0,RATKER2.troops-ROUT2.atkTroopDmg),fD=Math.max(0,RDEFDR2.troops-ROUT2.defTroopDmg);
    const fAH=Math.max(0,RATKER2.hp-ROUT2.atkHPDmg),fDH=Math.max(0,RDEFDR2.hp-ROUT2.defHPDmg);
    setShowIntro(false);setIntroFading(false);setShowBattle(false);setShowCollision(false);setShowBurst(false);
    setAtkT(fA);setDefT(fD);setAtkHP(fAH);setDefHP(fDH);
    setPhaseIdx(RPH2.indexOf('result'));
    T(()=>{if(fA<=0)setAtkBanner('全滅');if(fDH<=0)setDefBanner('撃破');},300);
  },[]);

  React.useEffect(()=>{
    if(phase==='intro'){
      T(()=>{setIntroFading(true);T(()=>{setShowIntro(false);setIntroFading(false);setPhaseIdx(RPH2.indexOf('battle'));},380);},RDUR2.intro-380);
    } else if(phase==='battle'){
      setShowBattle(true);
      T(()=>{setShowBattle(false);setPhaseIdx(RPH2.indexOf('collision'));},RDUR2.battle);
    } else if(phase==='collision'){
      setShowCollision(true);T(()=>setShowBurst(true),100);
      T(()=>{setDefShake(true);T(()=>setDefShake(false),450);},150);
      T(()=>{setAtkShake(true);T(()=>setAtkShake(false),450);},250);
      T(()=>{setShowCollision(false);setPhaseIdx(RPH2.indexOf('resolve'));},RDUR2.collision);
    } else if(phase==='resolve'){
      setShowBurst(false);
      const steps=24,atkTF=Math.max(0,RATKER2.troops-ROUT2.atkTroopDmg),defTF=Math.max(0,RDEFDR2.troops-ROUT2.defTroopDmg);
      const atkHF=Math.max(0,RATKER2.hp-ROUT2.atkHPDmg),defHF=Math.max(0,RDEFDR2.hp-ROUT2.defHPDmg);
      Array.from({length:steps}).forEach((_,i)=>{
        T(()=>{const p=(i+1)/steps,lerp=(a,b)=>Math.round(a+(b-a)*p);
          setAtkT(lerp(RATKER2.troops,atkTF));setDefT(lerp(RDEFDR2.troops,defTF));
          setAtkHP(lerp(RATKER2.hp,atkHF));setDefHP(lerp(RDEFDR2.hp,defHF));
        },(i/steps)*RDUR2.resolve);
      });
      T(()=>setPhaseIdx(RPH2.indexOf('result')),RDUR2.resolve);
    } else if(phase==='result'){
      T(()=>{if(atkT<=0)setAtkBanner('全滅');if(defHP<=0)setDefBanner('撃破');},350);
    }
    return ()=>clearT();
  },[phase]);

  const atkLine=RATKER2.lines[phase]||RATKER2.lines.intro;
  const defLine=RDEFDR2.lines[phase]||RDEFDR2.lines.intro;

  return(
    <div onClick={()=>{if(phase!=='result')skipToResult();}}
      style={{width:'100%',height:'100%',background:RBG2,fontFamily:"'Noto Sans JP',sans-serif",color:RTX2,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative',cursor:phase==='result'?'default':'pointer'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px',height:46,background:'rgba(5,5,20,.96)',borderBottom:'1px solid rgba(255,255,255,.07)',flexShrink:0,zIndex:10}}>
        <div style={{display:'flex',alignItems:'center',gap:8,fontSize:12}}>
          <img src="assets/logo_tohoku.png" alt="" style={{height:26,objectFit:'contain'}}/>
          <span style={{color:RPK2,fontWeight:700}}>東北家</span>
          <span style={{color:RTXD2,fontSize:10}}>→</span>
          <span style={{fontWeight:600}}>{RDEFDR2.name}</span>
        </div>
        <div style={{fontFamily:'Rajdhani',fontSize:15,fontWeight:700,letterSpacing:1}}>ROUND {round} / 5 — 戦闘解決</div>
        <div style={{fontFamily:'Rajdhani',fontSize:12,color:RTXD2}}>
          <span style={{color:RAC2,fontWeight:700}}>{RDEFDR2.name}</span>
        </div>
      </div>
      <div style={{flex:1,minHeight:0,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',inset:0,backgroundImage:'url(assets/bg_battle.jpg)',backgroundSize:'cover',backgroundPosition:'center 40%',filter:'brightness(.5) contrast(1.1)'}}/>
        <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 50% 50%,transparent 25%,rgba(0,0,0,.65) 100%)'}}/>
        {/* troop counters */}
        <div style={{position:'absolute',top:14,left:12}}>
          <div style={{fontFamily:"'Noto Sans JP'",fontSize:10,fontWeight:700,color:RTXD2,letterSpacing:1,textShadow:'0 1px 4px rgba(0,0,0,.9)'}}>部下数.</div>
          {atkBanner
            ?<div style={{fontFamily:"'Zen Maru Gothic'",fontSize:52,fontWeight:900,lineHeight:1,color:'#ff1111',textShadow:'0 0 20px #ff0000',animation:'bannerDrop .55s cubic-bezier(.16,1,.3,1) both'}}>{atkBanner}</div>
            :<div key={atkT} style={{fontFamily:'Rajdhani',fontSize:44,fontWeight:900,lineHeight:1,color:'#7fff00',textShadow:'0 0 16px rgba(80,255,0,.8)',animation:'countDrop .18s ease'}}>{atkT}</div>}
        </div>
        <div style={{position:'absolute',top:14,right:12,textAlign:'right'}}>
          <div style={{fontFamily:"'Noto Sans JP'",fontSize:10,fontWeight:700,color:RTXD2,letterSpacing:1,textShadow:'0 1px 4px rgba(0,0,0,.9)'}}>部下数.</div>

// Battle Curtain
function BCurtain({stage, label, toResolve}){
  if(stage==='idle') return null;
  const closing=stage==='closing', closed=stage==='closed', opening=stage==='opening';
  return(
    <div style={{
      position:'absolute',inset:0,zIndex:9999,
      background:toResolve?'linear-gradient(150deg,#0a0816,#1a0828)':'linear-gradient(150deg,#fff8f0,#ffe8d0)',
      display:'flex',alignItems:'center',justifyContent:'center',
      animation:closing?'curtainIn .42s cubic-bezier(.4,0,.2,1) forwards':opening?'curtainOut .42s cubic-bezier(.4,0,.2,1) forwards':'none',
      opacity:closed?1:undefined,
    }}>
      {[0,1,2,3].map(i=>(
        <div key={i} style={{position:'absolute',top:`${15+i*22}%`,left:'-5%',right:'-5%',height:'1px',background:`linear-gradient(90deg,transparent,${toResolve?'rgba(196,66,122,.3)':'rgba(184,112,16,.25)'},transparent)`,transform:`rotate(${-2+i*.8}deg)`}}/>
      ))}
      {(closed||opening)&&(
        <div style={{textAlign:'center',animation:closed?'labelPop .5s .05s cubic-bezier(.16,1,.3,1) both':'none'}}>
          <div style={{fontFamily:"'Zen Maru Gothic',sans-serif",fontSize:56,fontWeight:900,letterSpacing:8,color:toResolve?'#fff':'#1c1020',textShadow:toResolve?'0 0 40px rgba(196,66,122,.9),0 0 80px rgba(196,66,122,.4)':'0 0 30px rgba(184,112,16,.5)',lineHeight:1}}>{label}</div>
          <div style={{marginTop:10,fontSize:11,letterSpacing:4,color:toResolve?'rgba(255,255,255,.4)':'rgba(28,16,32,.35)',fontFamily:'Rajdhani',fontWeight:600}}>
            {toResolve?'— BATTLE RESOLUTION —':'— ACTION SELECTION —'}
          </div>
        </div>
      )}
    </div>
  );
}

// BattleFlow — wraps ActionScene + ResolveScene with curtain
function BattleFlow({ formation, targetNode, onComplete }) {
  const [scene, setBScene] = React.useState('action');
  const [round, setRound] = React.useState(1);
  const [curtain, setCurtain] = React.useState('idle');
  const [curtainLabel, setCurtainLabel] = React.useState('');
  const [toResolve, setToResolve] = React.useState(true);
  const [actionKey, setActionKey] = React.useState(0);
  const [resolveKey, setResolveKey] = React.useState(0);

  const transition = (nextScene, label, isToResolve) => {
    setToResolve(isToResolve);
    setCurtainLabel(label);
    setCurtain('closing');
    setTimeout(()=>{
      setCurtain('closed');
      setBScene(nextScene);
      if(nextScene==='resolve') setResolveKey(k=>k+1);
      else { setRound(r=>Math.min(r+1,5)); setActionKey(k=>k+1); }
      setTimeout(()=>{
        setCurtain('opening');
        setTimeout(()=>setCurtain('idle'),460);
      },640);
    },450);
  };

  return (
    <div className="scene-enter" style={{width:'100%', height:'100%', position:'relative', overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,opacity:scene==='action'?1:0,pointerEvents:scene==='action'?'all':'none',transition:'opacity .05s'}}>
        <BActionScene key={actionKey} round={round} formation={formation} targetNode={targetNode}
          onComplete={()=>transition('resolve','戦闘解決',true)}/>
      </div>
      <div style={{position:'absolute',inset:0,opacity:scene==='resolve'?1:0,pointerEvents:scene==='resolve'?'all':'none',transition:'opacity .05s'}}>
        <BResolveScene key={resolveKey} round={round} formation={formation} targetNode={targetNode}
          onComplete={onComplete}/>
      </div>
      <BCurtain stage={curtain} label={curtainLabel} toResolve={toResolve}/>
    </div>
  );
}

Object.assign(window, { BattleFlow });
</script>

// Orchestrator — runs each faction cutin in sequence
function EnemyTurnSequence({ onComplete }) {
  const [idx, setIdx] = React.useState(0);
  const [phase, setPhase] = React.useState('in'); // in | hold | out
  const timers = React.useRef([]);
  const T = (fn, ms) => { const t=setTimeout(fn,ms); timers.current.push(t); };
  const clearT = () => { timers.current.forEach(clearTimeout); timers.current=[]; };

  React.useEffect(() => {
    clearT();
    setPhase('in');
    // hold
    T(() => setPhase('hold'), 600);
    // out
    T(() => setPhase('out'), 600 + 1700);
    // advance
    T(() => {
      if (idx < ENEMY_FACTIONS.length - 1) {
        setIdx(i => i + 1);
      } else {
        onComplete();
      }
    }, 600 + 1700 + 500);
    return clearT;
  }, [idx]);

  const handleSkip = () => {
    clearT();
    setPhase('out');
    setTimeout(() => {
      if (idx < ENEMY_FACTIONS.length - 1) setIdx(i => i + 1);
      else onComplete();
    }, 350);
  };

  const faction = ENEMY_FACTIONS[idx];
  return (
    <>
      <EnemyTurnProgress index={idx} total={ENEMY_FACTIONS.length} faction={faction}/>
      <FactionCutin
        key={idx}
        faction={faction}
        index={idx}
        total={ENEMY_FACTIONS.length}
        phase={phase}
        onSkip={handleSkip}
      />
    </>
  );
}

// ── Helper: get character + portrait ──────────────────────
function getChar(id) {
  return CHARS.find(c => c.id === id);
}
function getPortrait(char, expr) {
  if(!char) return null;
  // 差分対応（無ければベース立ち絵）
  if(expr && expr !== 'normal' && char.portrait) {
    // assets/portrait_kiritan.png → assets/portrait_kiritan_smile.png
    const variant = char.portrait.replace(/\.(png|jpg|jpeg)$/i, `_${expr}.$1`);
    // 実ファイルが無くてもonErrorで元立ち絵にフォールバックする実装
    return { primary: variant, fallback: char.portrait };
  }
  return { primary: char.portrait, fallback: null };
}

// ── Standing portrait ────────────────────────────────────
function StandingChar({ char, expr, pos, isActive, isSpeaking }) {
  const portrait = getPortrait(char, expr);
  if(!portrait?.primary) {
    // No portrait fallback — show silhouette
    return (
      <div style={{
        position:'absolute',
        bottom:0,

  const [imgSrc, setImgSrc] = React.useState(portrait.primary);

  // Position offset
  const baseLeft = pos==='left' ? '6%' : pos==='center' ? '50%' : 'auto';
  const baseRight = pos==='right' ? '6%' : 'auto';

    <div style={{
      position:'absolute',
      bottom: isSpeaking ? '-2%' : '-6%',

      right: baseRight,

      width:'min(32vw, 460px)',

      transition:'all .45s cubic-bezier(.16,1,.3,1), filter .3s',

        ? 'brightness(1.05) saturate(1.1) drop-shadow(0 12px 30px rgba(0,0,0,.5))'

      zIndex: isSpeaking ? 5 : 2,

          position:'absolute', inset:'auto -8% -3% -8%', height:'30%',

// ── Type-on text ─────────────────────────────────────────
function useTypewriter(text, speed=24, paused=false) {
  const [shown, setShown] = React.useState('');
  const [done, setDone] = React.useState(false);
  React.useEffect(() => {
    if(paused) return;
    setShown(''); setDone(false);
    if(!text) { setDone(true); return; }
    let i = 0;
    const tick = () => {
      i++;
      setShown(text.slice(0, i));
      if(i >= text.length) setDone(true);
      else timer = setTimeout(tick, speed);
    };
    let timer = setTimeout(tick, speed);
    return () => clearTimeout(timer);
  }, [text, speed, paused]);
  const finish = React.useCallback(() => { setShown(text || ''); setDone(true); }, [text]);
  return [shown, done, finish];
}

      color: active ? '#fff' : 'rgba(255,255,255,.85)',
      fontFamily:"'Noto Sans JP'", fontSize:11, fontWeight:600,
      cursor:'pointer', letterSpacing:'.08em',
      backdropFilter:'blur(8px)',
      transition:'all .15s',
    }}>{label}</button>
  );

  return (
    <div style={{
      position:'absolute', top:0, left:0, right:0, zIndex:25,
      padding:'12px 18px',
      display:'flex', alignItems:'center', gap:10,
      background:'linear-gradient(180deg, rgba(0,0,0,.6), transparent)',
      pointerEvents:'none',
    }}>
      {location && (
        <div style={{
          padding:'7px 16px', borderRadius:4,
          background:'rgba(0,0,0,.55)', border:'1px solid rgba(255,255,255,.12)',
          fontFamily:"'Zen Maru Gothic'", fontSize:13, fontWeight:700,
          color:'rgba(255,255,255,.92)', letterSpacing:'.08em',
          backdropFilter:'blur(8px)', pointerEvents:'auto',
        }}>◤ {location}</div>
      )}
      <div style={{flex:1}}/>
      <div style={{display:'flex', gap:8, pointerEvents:'auto'}}>
        <Btn label={isAuto ? '■ AUTO' : 'AUTO'} onClick={onAuto} active={isAuto}/>
        <Btn label="SKIP →" onClick={onSkip}/>
        <Btn label="LOG" onClick={onLog}/>
        <Btn label="✕" onClick={onExit}/>
      </div>
    </div>
  );
}

// ── Main ADVScene ───────────────────────────────────────
function ADVScene({ scenario, onExit }) {
  const [idx, setIdx] = React.useState(0);
  const [cast, setCast] = React.useState([]); // [{id, pos}]
  const [bg, setBg] = React.useState(null);
  const [location, setLocation] = React.useState('');
  const [history, setHistory] = React.useState([]); // dialog/narration only
  const [isAuto, setIsAuto] = React.useState(false);
  const [showLog, setShowLog] = React.useState(false);
  const [slashKey, setSlashKey] = React.useState(0);
  const [lastSpeaker, setLastSpeaker] = React.useState(null);

  // Process setup-type entries (advance through them)
  React.useEffect(() => {
    if(idx >= scenario.length) return;
    const e = scenario[idx];
    if(e.type === 'setup') {
      setCast(e.cast);
      if(e.bg) setBg(e.bg);
      if(e.location) setLocation(e.location);
      setIdx(i => i + 1);
    } else if(e.type === 'end') {
      // hold — exit on advance
    }
  }, [idx, scenario]);

  // Track speaker change for slash effect
  const current = scenario[idx];
  React.useEffect(() => {
    if(current?.type === 'dialog' && current.speaker !== lastSpeaker) {
      setSlashKey(k => k + 1);
      setLastSpeaker(current.speaker);
    } else if(current?.type === 'narration') {
      setLastSpeaker(null);
    }
  }, [idx]);

  // Add to history when entering a dialog/narration
  React.useEffect(() => {
    if(!current) return;
    if(current.type === 'dialog' || current.type === 'narration' || current.type === 'cutin') {
      setHistory(h => [...h, { speaker: current.speaker, text: current.text }]);
    }
  }, [idx]);

  // Auto mode
  const [autoReadyToAdvance, setAutoReadyToAdvance] = React.useState(false);
  React.useEffect(() => {
    if(!isAuto || !autoReadyToAdvance) return;
    const t = setTimeout(() => advance(), 1800);
    return () => clearTimeout(t);
  }, [isAuto, autoReadyToAdvance, idx]);

  const advance = React.useCallback(() => {
    setAutoReadyToAdvance(false);
    if(idx >= scenario.length - 1 || scenario[idx]?.type === 'end') {
      onExit();
      return;
    }
    setIdx(i => i + 1);
  }, [idx, scenario, onExit]);

  // Skip (right-click)
  const handleContextMenu = (e) => {
    e.preventDefault();
    // Skip: jump to next 'narration' break or end
    let next = idx + 1;
    while(next < scenario.length && scenario[next].type === 'dialog') next++;
    if(next >= scenario.length || scenario[next]?.type === 'end') {
      onExit();
      return;
    }
    // process all setups encountered
    for(let i = idx + 1; i <= next; i++) {
      const e = scenario[i];
      if(e?.type === 'setup') {
        setCast(e.cast);
        if(e.bg) setBg(e.bg);
        if(e.location) setLocation(e.location);
      }
    }
    setIdx(next);
  };

  // Wheel up = backlog
  const handleWheel = (e) => {
    if(e.deltaY < 0 && !showLog) {
      setShowLog(true);
    }
  };

  if(!current) return null;

  // For dialog/cutin, lookup char
  const speakerChar = (current.type === 'dialog' || current.type === 'cutin') && current.speaker
    ? getChar(current.speaker) : null;
  const speakerColor = speakerChar
    ? (ROLES[speakerChar.role]?.color || PK)
    : PK;

  return (
    <div
      className="scene-enter"
      onContextMenu={handleContextMenu}
      onWheel={handleWheel}
      style={{
        width:'100vw', height:'100vh',
        position:'relative', overflow:'hidden',
        background:'#0a0610',
        fontFamily:"'Noto Sans JP'",
        userSelect:'none',
      }}>

      {/* BG */}
      {bg && (
        <div style={{
          position:'absolute', inset:0,
          backgroundImage:`url(${bg})`,
          backgroundSize:'cover', backgroundPosition:'center',
          filter:'brightness(.55) saturate(.85) blur(1px)',
        }}/>
      )}
      {/* BG dim overlay */}
      <div style={{
        position:'absolute', inset:0,
        background:'linear-gradient(180deg, rgba(8,4,16,.4) 0%, rgba(8,4,16,.75) 100%)',
      }}/>

      {/* Standing characters */}
      {cast.map(c => {
        const char = getChar(c.id);
        if(!char) return null;
        const isSpeaking = current.type === 'dialog' && current.speaker === c.id;
        // expr: lookup from current entry only if speaker matches
        const expr = isSpeaking ? current.expr : 'normal';
        return (
          <StandingChar
            key={c.id}
            char={char}
            expr={expr}
            pos={c.pos}
            isSpeaking={isSpeaking}
          />
        );
      })}

      {/* Slash effect */}
      {slashKey > 0 && current.type === 'dialog' && <SlashEffect keyId={slashKey}/>}

      {/* Cutin */}
      {current.type === 'cutin' && speakerChar && (
        <PersonaCutin
          entry={current}
          char={speakerChar}
          color={speakerColor}
          onAdvance={() => { setAutoReadyToAdvance(true); advance(); }}
        />
      )}

      {/* Dialog/narration box */}
      {(current.type === 'dialog' || current.type === 'narration') && (
        <DialogBox
          entry={current}
          char={speakerChar}
          color={speakerColor}
          onAdvance={() => { setAutoReadyToAdvance(true); advance(); }}
          onFinishType={() => setAutoReadyToAdvance(true)}
        />
      )}

      {/* End screen */}
      {current.type === 'end' && (
        <div style={{
          position:'absolute', inset:0, zIndex:40,
          background:'rgba(8,4,16,.85)',
          display:'flex', alignItems:'center', justifyContent:'center',
          flexDirection:'column', gap:24,
          animation:'fadeIn .4s both',
        }}>
          <div style={{
            fontFamily:'Rajdhani', fontSize:14, fontWeight:700, letterSpacing:'.5em',
            color:'rgba(255,255,255,.5)',
          }}>END OF SCENE</div>
          <button onClick={onExit} style={{
            padding:'14px 40px', borderRadius:6,
            background:`linear-gradient(135deg, ${PK}, ${PK2})`,
            border:'none', color:'#fff',
            fontFamily:"'Noto Sans JP'", fontSize:14, fontWeight:700, letterSpacing:'.16em',
            cursor:'pointer',
            boxShadow:`0 4px 24px ${PK}66`,
          }}>続ける →</button>
        </div>
      )}

      {/* Top bar */}
      <ADVTopBar
        location={location}
        onAuto={() => setIsAuto(a => !a)}
        isAuto={isAuto}
        onSkip={() => onExit()}
        onLog={() => setShowLog(true)}
        onExit={onExit}
      />

      {/* Backlog */}
      {showLog && <Backlog history={history} onClose={() => setShowLog(false)}/>}

      {/* Hint at bottom-right */}
      <div style={{
        position:'absolute', right:14, bottom:140, zIndex:15,
        fontSize:9, color:'rgba(255,255,255,.35)',
        fontFamily:'Rajdhani', letterSpacing:'.2em',
        textAlign:'right', lineHeight:1.7,
        pointerEvents:'none',
      }}>
        左クリック: 進む<br/>
        右クリック: スキップ<br/>
        スクロール↑: バックログ
      </div>
    </div>
  );
}

// Inject keyframes
(function(){
  const id = '__adv_kf';
  if(document.getElementById(id)) return;
  const s = document.createElement('style');
  s.id = id;
  s.textContent = `
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes bounceY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes slashSweep { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
    @keyframes tagSlide { from{opacity:0;transform:skewX(-12deg) translateX(-30px)} to{opacity:1;transform:skewX(-12deg) translateX(0)} }
    @keyframes dialogFadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes cutinAppear { from{opacity:0} to{opacity:1} }
    @keyframes cutinPortraitIn { from{opacity:0;transform:translateX(60px) scale(1.05)} to{opacity:1;transform:translateX(0) scale(1)} }
    @keyframes fadeRight { from{opacity:0;transform:translateX(-30px)} to{opacity:1;transform:translateX(0)} }
  `;
  document.head.appendChild(s);
})();

Object.assign(window, { ADVScene, DEMO_SCENARIO });
</script>

<script type="text/babel" id="app-root">
const {useState, useCallback} = React;

// Missing keyframes needed by battle scene — inject once
(function(){
  const id = '__battle_kf';
  if(document.getElementById(id)) return;
  const s = document.createElement('style');
  s.id = id;
  s.textContent = `
    @keyframes activeGlow{0%,100%{box-shadow:0 0 0 2px rgba(196,66,122,.7),0 4px 24px rgba(196,66,122,.35);}50%{box-shadow:0 0 0 2px rgba(196,66,122,.9),0 4px 32px rgba(196,66,122,.5);}}
    @keyframes badgePulse{0%,100%{opacity:1;}50%{opacity:.65;}}
    @keyframes targetRing{0%,100%{box-shadow:0 0 0 2.5px rgba(192,121,24,.9),0 0 28px rgba(212,160,68,.65);}50%{box-shadow:0 0 0 3px #d4a044,0 0 44px rgba(212,160,68,.85);}}

    @keyframes introZoom{0%{transform:scale(4);opacity:0}100%{transform:scale(1);opacity:1}}
    @keyframes blastExpand{0%{transform:scale(0);opacity:1}60%{transform:scale(2.5);opacity:.8}100%{transform:scale(5);opacity:0}}
    @keyframes burstRight{0%{transform:translateX(0) scale(.6);opacity:1}30%{transform:translateX(55px) scale(1.3);opacity:1}100%{transform:translateX(210px) scale(.7);opacity:0}}
    @keyframes burstLeft{0%{transform:translateX(0) scale(.6);opacity:1}30%{transform:translateX(-55px) scale(1.3);opacity:1}100%{transform:translateX(-210px) scale(.7);opacity:0}}
    @keyframes chibiFlyR{0%{transform:translateX(0) scaleX(-1);opacity:1}80%{opacity:1}100%{transform:translateX(260px) scaleX(-1);opacity:0}}
    @keyframes chibiFlyL{0%{transform:translateX(0);opacity:1}80%{opacity:1}100%{transform:translateX(-260px);opacity:0}}
    @keyframes countDrop{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes bannerDrop{0%{transform:scale(3.5) rotate(-5deg);opacity:0}55%{transform:scale(.92) rotate(2deg);opacity:1}75%{transform:scale(1.06) rotate(-1deg)}100%{transform:scale(1) rotate(0);opacity:1}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
    @keyframes curtainIn{0%{clip-path:inset(50% 0 50% 0)}100%{clip-path:inset(0% 0 0% 0)}}
    @keyframes curtainOut{0%{clip-path:inset(0% 0 0% 0)}100%{clip-path:inset(50% 0 50% 0)}}
    @keyframes labelPop{0%{opacity:0;transform:scale(.8) translateY(10px)}60%{transform:scale(1.05) translateY(-2px)}100%{opacity:1;transform:scale(1) translateY(0)}}
  `;
  document.head.appendChild(s);
})();

function App() {
  const [scene, setScene] = useState('map');
  const [attackTarget, setAttackTarget] = useState(null);
  const [battleFormation, setBattleFormation] = useState(null);
  // turnPhase: 'player' | 'enemy' (cutin sequence) | 'playerCutin' (your-turn cutin)
  const [turnPhase, setTurnPhase] = useState('player');
  const [turn, setTurn] = useState(1);
  const [advScenario, setAdvScenario] = useState(null);
  const [sceneBeforeAdv, setSceneBeforeAdv] = useState('map');

  const handleNavigate = useCallback((dest) => {
    if(dest === 'map')    setScene('map');
    if(dest === 'party')  setScene('party');
    if(dest === 'adv') {
      setSceneBeforeAdv(scene);
      setAdvScenario(DEMO_SCENARIO);
      setScene('adv');
    }
    if(dest === 'turnEnd') {
      setTurnPhase('enemy');
    }
  }, [scene]);

  const handleAdvExit = useCallback(() => {
    setAdvScenario(null);
    setScene(sceneBeforeAdv || 'map');
  }, [sceneBeforeAdv]);

  const handleEnemyTurnComplete = useCallback(() => {
    setTurnPhase('playerCutin');
  }, []);

  const handlePlayerCutinComplete = useCallback(() => {
    setTurn(t => t + 1);
    setTurnPhase('player');
  }, []);

  const handleAttackNode = useCallback((node) => {
    setAttackTarget(node);
    setScene('formation');
  }, []);

  const handleLaunch = useCallback((formation, node) => {
    setBattleFormation(formation);
    setAttackTarget(node);
    setScene('battle');
  }, []);

  const handleBattleComplete = useCallback(() => {
    setScene('map');
    setAttackTarget(null);
    setBattleFormation(null);
  }, []);

  return (
    <div style={{width:'100vw', height:'100vh', overflow:'hidden'}}>
      {scene === 'map' && (
        <MapScene
          onNavigate={handleNavigate}
          onAttackNode={handleAttackNode}
        />
      )}
      {scene === 'party' && (
        <PartyScene
          onNavigate={handleNavigate}
        />
      )}
      {scene === 'formation' && (
        <AttackFormationScene
          targetNode={attackTarget}
          onLaunch={handleLaunch}
          onCancel={() => setScene('map')}
        />
      )}
      {scene === 'battle' && (
        <BattleFlow
          formation={battleFormation}
          targetNode={attackTarget}
          onComplete={handleBattleComplete}
        />
      )}

      {scene === 'adv' && advScenario && (
        <ADVScene
          scenario={advScenario}
          onExit={handleAdvExit}
        />
      )}

      {/* Enemy turn cutin sequence — overlays current scene */}
      {turnPhase === 'enemy' && (
        <EnemyTurnSequence onComplete={handleEnemyTurnComplete}/>
      )}

      {/* Your turn cutin */}
      {turnPhase === 'playerCutin' && (
        <PlayerTurnCutin onComplete={handlePlayerCutinComplete}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
