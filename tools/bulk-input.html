<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キャラクター一括登録 — Kiritan_R Editor</title>
  <link rel="stylesheet" href="/editor.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      font-family: 'Noto Sans JP', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      background: var(--color-background-secondary);
      border-bottom: 1px solid var(--color-border-tertiary);
      flex-shrink: 0;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header a {
      font-size: 13px;
      color: var(--color-text-info);
      text-decoration: none;
    }
    .header a:hover { text-decoration: underline; }
    .body {
      display: flex;
      gap: 12px;
      flex: 1;
      overflow: hidden;
      padding: 12px;
    }
    .left-col {
      flex: 0 0 400px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .right-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
    }
    label.col-label {
      font-size: 12px;
      color: var(--color-text-secondary);
      font-weight: 500;
    }
    textarea.json-input {
      flex: 1;
      resize: none;
      font-family: monospace;
      font-size: 12px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--color-border-secondary);
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      line-height: 1.5;
    }
    .btn-row { display: flex; gap: 8px; }
    button.btn-primary {
      padding: 7px 18px;
      border-radius: 6px;
      border: 1px solid var(--color-border-success);
      background: var(--color-background-success);
      color: var(--color-text-success);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button.btn-secondary {
      padding: 7px 18px;
      border-radius: 6px;
      border: 1px solid var(--color-border-info);
      background: var(--color-background-info);
      color: var(--color-text-info);
      font-size: 13px;
      cursor: pointer;
    }
    .error-box {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--color-border-danger);
      background: var(--color-background-danger);
      color: var(--color-text-danger);
      font-size: 12px;
      font-family: monospace;
    }
    .preview-wrap {
      flex: 1;
      overflow-y: auto;
    }
    table.preview-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    table.preview-table th {
      text-align: left;
      padding: 6px 8px;
      border-bottom: 1px solid var(--color-border-secondary);
      color: var(--color-text-secondary);
      font-weight: 500;
      white-space: nowrap;
    }
    table.preview-table td {
      padding: 5px 8px;
      border-bottom: 1px solid var(--color-border-tertiary);
      color: var(--color-text-primary);
      font-family: monospace;
    }
    table.preview-table tr:hover td { background: var(--color-background-secondary); }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      background: #2a7a4a;
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s;
      z-index: 999;
    }
    .toast.error { background: #8a2a2a; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <a href="/">← エディタに戻る</a>
    <h1>キャラクター一括登録</h1>
  </div>
  <div class="body">
    <div class="left-col">
      <label class="col-label">JSON 入力</label>
      <textarea class="json-input" id="jsonInput" placeholder='以下のJSON配列を貼り付け:
[
  {
    "id": "char_xxx",
    "name": "名前",
    "soldiers": 100,
    "factionId": "faction_player"
  }
]'></textarea>
      <div class="btn-row">
        <button class="btn-secondary" onclick="doPreview()">プレビュー</button>
        <button class="btn-primary" onclick="doRegister()">一括登録</button>
      </div>
      <div id="errorBox" style="display:none"></div>
    </div>
    <div class="right-col">
      <label class="col-label">プレビュー</label>
      <div class="preview-wrap">
        <table class="preview-table">
          <thead>
            <tr>
              <th>id</th>
              <th>name</th>
              <th>soldiers</th>
              <th>factionId</th>
            </tr>
          </thead>
          <tbody id="previewBody">
            <tr><td colspan="4" style="color:var(--color-text-secondary);padding:16px 8px">JSONを入力して「プレビュー」を押してください</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const DEFAULTS = {
      isTemplate: false,
      status: 'standby',
      charHp: 100,
      charMaxHp: 100,
      charAttack: 10,
      charSong: 5,
      soldierAtk: 8,
      soldierDef: 5,
      battleCapacity: 30,
      skills: [],
      nameVariants: [],
    };

    let _parsed = null;

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.className = 'error-box';
      box.textContent = msg;
      box.style.display = 'block';
    }

    function clearError() {
      document.getElementById('errorBox').style.display = 'none';
    }

    function showToast(msg, type = 'ok') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast' + (type === 'error' ? ' error' : '') + ' show';
      setTimeout(() => { t.classList.remove('show'); }, 2800);
    }

    function applyDefaults(char) {
      const soldiers = char.soldiers ?? 100;
      return {
        ...DEFAULTS,
        maxSoldiers: soldiers,
        ...char,
        soldiers,
      };
    }

    function doPreview() {
      clearError();
      const raw = document.getElementById('jsonInput').value.trim();
      if (!raw) { showError('JSONを入力してください'); return; }
      try {
        _parsed = JSON.parse(raw);
        if (!Array.isArray(_parsed)) { showError('JSON配列（[...]）で入力してください'); _parsed = null; return; }
      } catch (e) {
        showError('JSONパースエラー: ' + e.message);
        _parsed = null;
        return;
      }
      const tbody = document.getElementById('previewBody');
      tbody.innerHTML = '';
      if (_parsed.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="color:var(--color-text-secondary);padding:16px 8px">エントリなし</td></tr>';
        return;
      }
      _parsed.forEach(c => {
        const tr = document.createElement('tr');
        [c.id ?? '（未設定）', c.name ?? '（未設定）', c.soldiers ?? 100, c.factionId ?? ''].forEach(val => {
          const td = document.createElement('td');
          td.textContent = val;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    async function doRegister() {
      if (!_parsed) { doPreview(); if (!_parsed) return; }
      const entries = _parsed.map(applyDefaults);
      try {
        const res = await fetch('/api/bulk-register/characters', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ characters: entries }),
        });
        const json = await res.json();
        if (!res.ok) { showToast('登録失敗: ' + (json.error || res.status), 'error'); return; }
        showToast(`登録完了 — 追加: ${json.added} 件 / 更新: ${json.updated} 件`);
      } catch (e) {
        showToast('通信エラー: ' + e.message, 'error');
      }
    }
  </script>
</body>
</html>
